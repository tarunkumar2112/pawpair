<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      background-color: #f8f9fa;
    }
    .email-container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
    }
    .header {
      background: linear-gradient(135deg, #F6F2EA 0%, #E8DFD0 100%);
      padding: 40px 20px;
      text-align: center;
    }
    .logo {
      max-width: 160px;
      height: auto;
      margin-bottom: 10px;
    }
    .tagline {
      color: #2F3E4E;
      font-size: 14px;
      margin: 0;
    }
    .content {
      padding: 40px 30px;
    }
    .role-badge {
      display: inline-block;
      background-color: #5F7E9D;
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .role-badge.owner {
      background-color: #5F7E9D;
    }
    .role-badge.caregiver {
      background-color: #8B7355;
    }
    h1 {
      color: #2F3E4E;
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 16px 0;
      line-height: 1.3;
    }
    p {
      color: #4a5568;
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 16px 0;
    }
    .button {
      display: inline-block;
      background-color: #5F7E9D;
      color: #ffffff !important;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      margin: 20px 0;
      text-align: center;
    }
    .button:hover {
      background-color: #4d6681;
    }
    .info-box {
      background-color: #F6F2EA;
      border-left: 4px solid #5F7E9D;
      padding: 16px 20px;
      margin: 24px 0;
      border-radius: 8px;
    }
    .info-box.warning {
      background-color: #FEF3C7;
      border-left-color: #F59E0B;
    }
    .info-box p {
      margin: 0;
      font-size: 14px;
      color: #2F3E4E;
    }
    .footer {
      background-color: #2F3E4E;
      color: #ffffff;
      padding: 30px;
      text-align: center;
    }
    .footer p {
      color: #cbd5e0;
      font-size: 14px;
      margin: 8px 0;
    }
    .footer a {
      color: #93c5fd;
      text-decoration: none;
    }
    .divider {
      height: 1px;
      background-color: #e2e8f0;
      margin: 30px 0;
    }
    .paw-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }
    @media only screen and (max-width: 600px) {
      .content {
        padding: 30px 20px;
      }
      h1 {
        font-size: 24px;
      }
      .button {
        display: block;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="email-container">
    <!-- Header -->
    <div class="header">
      <img src="https://yourdomain.com/logo.png" alt="PawPair Logo" class="logo">
      <p class="tagline">Pet care, perfectly matched.</p>
    </div>

    <!-- Content -->
    <div class="content">
      {{CONTENT}}
    </div>

    <!-- Footer -->
    <div class="footer">
      <p><strong>PawPair</strong></p>
      <p>Connecting pet owners with trusted caregivers</p>
      <p style="margin-top: 20px;">
        <a href="{{APP_URL}}">Visit Website</a> | 
        <a href="{{APP_URL}}/contact">Contact Us</a> | 
        <a href="{{APP_URL}}/help">Help Center</a>
      </p>
      <p style="margin-top: 20px; font-size: 12px;">
        © 2024 PawPair. All rights reserved.
      </p>
      <p style="font-size: 12px;">
        You're receiving this email because you signed up for PawPair.<br>
        <a href="{{UNSUBSCRIBE_URL}}">Unsubscribe</a> from these emails.
      </p>
    </div>
  </div>
</body>
</html>
